server:
  port: 8085

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/librarydb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:zQJ0ZpPt4mPZVYh0Zc1nOe2P0ySmx3Ee2TPu3C5g8KU=}

auth-service:
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
