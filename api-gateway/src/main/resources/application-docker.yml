# Docker profile — overrides localhost URIs with Docker Compose service names.
# Activated automatically when SPRING_PROFILES_ACTIVE=docker is set in docker-compose.yml.
spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedHeaders:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: student-service
          uri: http://student-service:8082
          predicates:
            - Path=/api/students/**

        - id: seat-availability
          uri: http://seat-service:8083
          predicates:
            - Path=/api/seats/**

        - id: bookings
          uri: http://seat-service:8083
          predicates:
            - Path=/api/bookings/**

        - id: admin-bookings
          uri: http://seat-service:8083
          predicates:
            - Path=/api/admin/bookings/**

        - id: admin-seats
          uri: http://seat-service:8083
          predicates:
            - Path=/api/admin/seats/**

        - id: payment-service
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**

        - id: admin-reports
          uri: http://payment-service:8084
          predicates:
            - Path=/api/admin/reports/**

        - id: notification-service
          uri: http://notification-service:8085
          predicates:
            - Path=/api/notifications/**

        - id: admin-emails
          uri: http://notification-service:8085
          predicates:
            - Path=/api/admin/emails/**

        - id: admin-service
          uri: http://admin-service:8086
          predicates:
            - Path=/api/admin/**
